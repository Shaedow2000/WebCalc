<!DOCTYPE html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="src/style.css" rel="stylesheet">
        <script src="src/main.js" type="module" defer></script>
    </head>
    <body class="flex justify-center items-center w-screen h-screen bg-gray-400 dark:bg-gray-800">
        <main class="w-screen h-screen md:w-fit md:h-fit md:rounded-2xl bg-gray-500 dark:bg-gray-600 p-6 shadow-2xl shadow-black">
            <section id="screen" class="w-full h-52 md:h-42 bg-gray-400 dark:bg-gray-500 rounded-2xl border-2 border-black p-4">
                <div id="operation-div" class="w-full h-2/3 flex items-center">
                    <h3 id="operation" class="text-3xl font-semibold text-black"></h3>
                </div>
                <div id="result-div" class="w-full h-fit flex justify-end items-center">
                    <h3 id="result" class="text-5xl font-bold"></h3>
                </div>
            </section>
            <section id="buttons">
                <section id="top-buttons">
                    <div id="AC">
                        AC
                    </div>
                    <div id="DEL">
                        DEL
                    </div>
                    <div id="l-bracket">
                        (
                    </div>
                    <div id="r-bracket">
                        )
                    </div>
                </section>
                <section class="flex">
                    <section id="numbers">
                        <section>
                            <div id="7">
                                7
                            </div> 
                            <div id="8">
                                8
                            </div> 
                            <div id="9">
                                9
                            </div> 
                        </section> 
                        <section>
                            <div id="4">
                                4
                            </div> 
                            <div id="5">
                                5
                            </div> 
                            <div id="6">
                                6
                            </div> 
                        </section>
                        <section>
                            <div id="1">
                                1
                            </div> 
                            <div id="2">
                                2
                            </div> 
                            <div id="3">
                                3
                            </div> 
                        </section>
                        <section>
                            <div id="dot">
                                .
                            </div>
                            <div id="0">
                                0
                            </div>
                            <div id="+">
                                + 
                            </div>
                        </section>
                    </section>
                    <section id="symbols">
                        <div id="/">
                            /
                        </div> 
                        <div id="x">
                            x
                        </div>
                        <div id="-">
                            -
                        </div>
                        <div id="=">
                            =
                        </div>
                    </section>
                </section>
        </main> 
    </body>
</html>
