<!DOCTYPE html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="src/style.css" rel="stylesheet">
        <script src="src/main.js" type="module" defer></script>
    </head>
    <body class="flex justify-center items-center w-screen h-screen bg-gray-400 dark:bg-gray-800">
        <main class="w-fit h-2/3 rounded-2xl bg-gray-500 dark:bg-gray-600 p-6 shadow-2xl shadow-black">
            <section id="screen" class="w-full h-42 bg-gray-400 dark:bg-gray-500 rounded-2xl border-2 border-black p-4">
                <div id="operation-div" class="w-full h-2/3 flex items-center">
                    <h3 id="operation" class="text-3xl font-semibold text-black"></h3>
                </div>
                <div id="result-div" class="w-full h-fit flex justify-end items-center">
                    <h3 id="result" class="text-5xl font-bold"></h3>
                </div>
            </section>
            <section id="buttons">
                <section id="top-buttons">
                    <div id="AC">
                        AC
                    </div>
                    <div id="DEL">
                        DEL
                    </div>
                    <div id="l-bracket">
                        (
                    </div>
                    <div id="r-bracket">
                        )
                    </div>
                    <div id="dot">
                        .
                    </div>
                    <div id="info">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M272 112C272 85.5 293.5 64 320 64C346.5 64 368 85.5 368 112C368 138.5 346.5 160 320 160C293.5 160 272 138.5 272 112zM224 256C224 238.3 238.3 224 256 224L320 224C337.7 224 352 238.3 352 256L352 512L384 512C401.7 512 416 526.3 416 544C416 561.7 401.7 576 384 576L256 576C238.3 576 224 561.7 224 544C224 526.3 238.3 512 256 512L288 512L288 288L256 288C238.3 288 224 273.7 224 256z"/></svg>
                    </div>
                </section>
            </section>
        </main> 
    </body>
</html>
