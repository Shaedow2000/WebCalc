<!DOCTYPE html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="src/style.css" rel="stylesheet">
        <script src="src/main.js" type="module" defer></script>
    </head>
    <body class="flex justify-center items-center w-screen h-screen bg-gray-400 dark:bg-gray-800">
        <main class="w-2/5 h-2/3 rounded-2xl bg-gray-500 dark:bg-gray-600 p-6 shadow-2xl shadow-black">
            <section id="screen" class="w-full h-42 bg-gray-400 dark:bg-gray-500 rounded-2xl border-2 border-black p-4">
                <div id="operation-div" class="w-full h-2/3 flex items-center">
                    <h3 id="operation" class="text-3xl font-semibold text-black"></h3>
                </div>
                <div id="result-div" class="w-full h-fit flex justify-end items-center">
                    <h3 id="result" class="text-5xl font-bold"></h3>
                </div>
            </section>
            <section id="buttons">
                <section id="top-buttons">
                    <div id="AC">
                        AC
                    </div>
                    <div id="DEL">
                        DEL
                    </div>
                    <div id="l-bracket">
                        (
                    </div>
                    <div id="r-bracket">
                        )
                    </div>
                    <div id="dot">
                        .
                    </div>
                </section>
            </section>
        </main> 
    </body>
</html>
