<!DOCTYPE html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="src/style.css" rel="stylesheet">
        <script src="src/main.js" type="module" defer></script>
    </head>
    <body class="flex justify-center items-center w-screen h-screen bg-gray-400 dark:bg-gray-800">
        <div class="absolute top-2.5 right-2.5 w-fit h-fit shadow-md shadow-black transition-all" id="mode-btn">
            <svg class="w-8 h-8" id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576C388.8 576 451.3 548.8 497.3 504.6C504.6 497.6 506.7 486.7 502.6 477.5C498.5 468.3 488.9 462.6 478.8 463.4C473.9 463.8 469 464 464 464C362.4 464 280 381.6 280 280C280 207.9 321.5 145.4 382.1 115.2C391.2 110.7 396.4 100.9 395.2 90.8C394 80.7 386.6 72.5 376.7 70.3C358.4 66.2 339.4 64 320 64z"/></svg>
            <svg id="sun" class="w-8 h-8 hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 32C328.4 32 336.3 36.4 340.6 43.7L396.1 136.3L500.9 110C509.1 108 517.8 110.4 523.7 116.3C529.6 122.2 532 131 530 139.1L503.7 243.8L596.4 299.3C603.6 303.6 608.1 311.5 608.1 319.9C608.1 328.3 603.7 336.2 596.4 340.5L503.7 396.1L530 500.8C532 509 529.6 517.7 523.7 523.6C517.8 529.5 509 532 500.9 530L396.2 503.7L340.7 596.4C336.4 603.6 328.5 608.1 320.1 608.1C311.7 608.1 303.8 603.7 299.5 596.4L243.9 503.7L139.2 530C131 532 122.4 529.6 116.4 523.7C110.4 517.8 108 509 110 500.8L136.2 396.1L43.6 340.6C36.4 336.2 32 328.4 32 320C32 311.6 36.4 303.7 43.7 299.4L136.3 243.9L110 139.1C108 130.9 110.3 122.3 116.3 116.3C122.3 110.3 131 108 139.2 110L243.9 136.2L299.4 43.6L301.2 41C305.7 35.3 312.6 31.9 320 31.9zM320 176C240.5 176 176 240.5 176 320C176 399.5 240.5 464 320 464C399.5 464 464 399.5 464 320C464 240.5 399.5 176 320 176zM320 416C267 416 224 373 224 320C224 267 267 224 320 224C373 224 416 267 416 320C416 373 373 416 320 416z"/></svg>
        </div>
        <main class="w-screen h-screen md:w-fit md:h-fit md:rounded-2xl bg-gray-500 dark:bg-gray-600 p-6 shadow-2xl shadow-black">
            <section id="screen" class="w-full h-52 md:h-42 bg-gray-400 dark:bg-gray-500 rounded-2xl border-2 border-black p-4 shadow-md shadow-black">
                <div id="operation-div" class="w-full h-2/3 flex items-center">
                    <h3 id="operation" class="text-3xl font-semibold text-black overflow-x-auto overflow-y-hidden [direction:rtl]"></h3>
                </div>
                <div id="result-div" class="ml-auto w-2/3 h-fit flex justify-end items-center">
                    <h3 id="result" class="text-5xl font-bold overflow-x-auto overflow-y-hidden"></h3>
                </div>
            </section>
            <section id="buttons">
                <section id="top-buttons">
                    <div id="AC" class="btn">
                        AC
                    </div>
                    <div id="DEL" class="btn">
                        DEL
                    </div>
                    <div id="l-bracket" class="btn">
                        (
                    </div>
                    <div id="r-bracket" class="btn">
                        )
                    </div>
                </section>
                <section class="flex justify-between">
                    <section id="numbers">
                        <section>
                            <div id="7" class="btn">
                                7
                            </div> 
                            <div id="8" class="btn">
                                8
                            </div> 
                            <div id="9" class="btn">
                                9
                            </div> 
                        </section> 
                        <section>
                            <div id="4" class="btn">
                                4
                            </div> 
                            <div id="5" class="btn">
                                5
                            </div> 
                            <div id="6" class="btn">
                                6
                            </div> 
                        </section>
                        <section>
                            <div id="1" class="btn">
                                1
                            </div> 
                            <div id="2" class="btn">
                                2
                            </div> 
                            <div id="3" class="btn">
                                3
                            </div> 
                        </section>
                        <section>
                            <div id="dot" class="btn">
                                .
                            </div>
                            <div id="0" class="btn">
                                0
                            </div>
                            <div id="+" class="plus-btn btn">
                                + 
                            </div>
                        </section>
                    </section>
                    <section id="symbols">
                        <div id="/" class="btn">
                            /
                        </div> 
                        <div id="x" class="btn">
                            x
                        </div>
                        <div id="-" class="btn">
                            -
                        </div>
                        <div id="=" class="eq-btn btn">
                            =
                        </div>
                    </section>
                </section>
        </main> 
    </body>
</html>
